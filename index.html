<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Message Display</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f2eb;
        --panel: rgba(255, 255, 255, 0.86);
        --ink: #101317;
        --muted: #5c6470;
        --line: rgba(16, 19, 23, 0.14);
        --accent: #d84c33;
        --stage-a: #f9df6d;
        --stage-b: #f56f46;
        --stage-c: #1c7378;
        --stage-ink: #fff8e7;
        --shadow: 0 24px 70px rgba(16, 19, 23, 0.18);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 10% 10%, rgba(216, 76, 51, 0.18), transparent 28rem),
          linear-gradient(135deg, #f5f2eb 0%, #d7f0eb 54%, #f8d7ca 100%);
        color: var(--ink);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
        gap: 18px;
        min-height: 100vh;
        padding: 18px;
      }

      .controls {
        align-self: stretch;
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-height: 0;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(16, 19, 23, 0.12);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1;
      }

      .tone-tabs,
      .style-grid,
      .actions {
        display: grid;
        gap: 8px;
      }

      .tone-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tab,
      .preset,
      .action,
      .toggle {
        min-height: 42px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease,
          color 160ms ease;
      }

      .tab:hover,
      .preset:hover,
      .action:hover,
      .toggle:hover {
        transform: translateY(-1px);
        border-color: rgba(16, 19, 23, 0.34);
      }

      .tab.active,
      .toggle.active {
        background: var(--ink);
        color: #fff;
      }

      .message-entry {
        display: grid;
        gap: 8px;
      }

      label,
      .section-label {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      textarea {
        width: 100%;
        min-height: 112px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fff;
        color: var(--ink);
        line-height: 1.25;
        outline: none;
      }

      textarea:focus,
      input[type="range"]:focus-visible,
      button:focus-visible {
        outline: 3px solid rgba(28, 115, 120, 0.32);
        outline-offset: 2px;
      }

      .preset-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .preset {
        padding: 10px 12px;
        text-align: left;
        line-height: 1.2;
      }

      .preset strong {
        display: block;
        font-size: 0.86rem;
      }

      .preset span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .style-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .swatch {
        min-height: 46px;
        border-radius: 8px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 0 1px rgba(16, 19, 23, 0.14);
        cursor: pointer;
      }

      .swatch.active {
        outline: 3px solid var(--ink);
        outline-offset: 2px;
      }

      .swatch.sunset {
        background: linear-gradient(135deg, #f9df6d, #f56f46 56%, #1c7378);
      }

      .swatch.midnight {
        background: linear-gradient(135deg, #15131c, #315b91 52%, #f4c15d);
      }

      .swatch.mint {
        background: linear-gradient(135deg, #cbf2db, #27887f 55%, #17353a);
      }

      .swatch.rose {
        background: linear-gradient(135deg, #ffe1e9, #cf4265 54%, #35233a);
      }

      .slider-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .size-value {
        min-width: 56px;
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--muted);
        text-align: center;
        font-size: 0.82rem;
      }

      .actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .action {
        display: grid;
        place-items: center;
        padding: 0 10px;
        font-weight: 750;
      }

      .stage-wrap {
        position: relative;
        display: grid;
        min-width: 0;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: calc(100vh - 36px);
        padding: clamp(18px, 4vw, 72px);
        overflow: hidden;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.16), transparent 42%),
          radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.32), transparent 16rem),
          linear-gradient(135deg, var(--stage-a), var(--stage-b) 54%, var(--stage-c));
        color: var(--stage-ink);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 42px 42px;
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .stage::after {
        content: "";
        position: absolute;
        inset: auto 4% 4% auto;
        width: min(34vw, 390px);
        aspect-ratio: 1;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.28);
        transform: rotate(-10deg);
        pointer-events: none;
      }

      .display-message {
        position: relative;
        z-index: 1;
        width: min(100%, 1180px);
        margin: 0;
        font-size: clamp(3.4rem, var(--message-size, 12vw), 14rem);
        font-weight: 950;
        line-height: 0.92;
        letter-spacing: 0;
        text-align: center;
        text-wrap: balance;
        overflow-wrap: anywhere;
        text-shadow: 0 0.08em 0.22em rgba(16, 19, 23, 0.28);
      }

      .display-message.serif {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 900;
      }

      .display-message.mono {
        font-family: "Arial Black", Impact, ui-sans-serif, system-ui, sans-serif;
      }

      .display-message.script {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-weight: 850;
        font-style: italic;
      }

      .display-message.uppercase {
        text-transform: uppercase;
      }

      .display-message.outline {
        color: transparent;
        -webkit-text-stroke: 0.035em var(--stage-ink);
        text-shadow: 0 0.08em 0.22em rgba(16, 19, 23, 0.18);
      }

      .display-message.soft {
        font-weight: 700;
      }

      .stage-badge {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 2;
        padding: 8px 10px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        background: rgba(16, 19, 23, 0.18);
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      body.presentation .controls {
        display: none;
      }

      body.presentation .app {
        grid-template-columns: 1fr;
        padding: 0;
      }

      body.presentation .stage-wrap {
        border-radius: 0;
      }

      body.presentation .stage {
        min-height: 100vh;
      }

      @media (max-width: 860px) {
        .app {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .stage {
          min-height: 62vh;
        }

        .controls {
          order: 2;
        }
      }

      @media (max-width: 520px) {
        .tone-tabs,
        .actions {
          grid-template-columns: 1fr;
        }

        .display-message {
          font-size: clamp(3rem, var(--message-size, 18vw), 8rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="controls" aria-label="Message controls">
        <div class="brand">
          <h1>Big Message</h1>
          <button class="action" id="presentButton" type="button" title="Presentation view">[]</button>
        </div>

        <div class="tone-tabs" aria-label="Message type">
          <button class="tab active" data-type="compliment" type="button">Compliment</button>
          <button class="tab" data-type="celebrate" type="button">Celebrate</button>
          <button class="tab" data-type="motivate" type="button">Motivate</button>
          <button class="tab" data-type="notice" type="button">Notice</button>
        </div>

        <div class="message-entry">
          <label for="messageInput">Message</label>
          <textarea id="messageInput" spellcheck="true">you look fantastic</textarea>
        </div>

        <div>
          <div class="section-label">Presets</div>
          <div class="preset-list" id="presetList"></div>
        </div>

        <div>
          <div class="section-label">Colors</div>
          <div class="style-grid" aria-label="Color themes">
            <button class="swatch sunset active" data-theme="sunset" type="button" title="Sunset"></button>
            <button class="swatch midnight" data-theme="midnight" type="button" title="Midnight"></button>
            <button class="swatch mint" data-theme="mint" type="button" title="Mint"></button>
            <button class="swatch rose" data-theme="rose" type="button" title="Rose"></button>
          </div>
        </div>

        <div>
          <div class="section-label">Text Style</div>
          <div class="actions">
            <button class="toggle active" data-font="sans" type="button" title="Bold sans">A</button>
            <button class="toggle" data-font="serif" type="button" title="Serif">Ag</button>
            <button class="toggle" data-font="script" type="button" title="Italic style">It</button>
          </div>
        </div>

        <div>
          <div class="section-label">Effects</div>
          <div class="actions">
            <button class="toggle" data-effect="uppercase" type="button" title="Uppercase">AA</button>
            <button class="toggle" data-effect="outline" type="button" title="Outline">O</button>
            <button class="toggle" data-effect="soft" type="button" title="Softer weight">S</button>
          </div>
        </div>

        <div>
          <div class="slider-row">
            <label for="sizeSlider">Size</label>
            <output class="size-value" id="sizeValue" for="sizeSlider">12vw</output>
          </div>
          <input id="sizeSlider" type="range" min="7" max="18" value="12" />
        </div>
      </section>

      <section class="stage-wrap" aria-label="Message preview">
        <div class="stage" id="stage">
          <div class="stage-badge" id="stageType">Compliment</div>
          <p class="display-message" id="displayMessage">you look fantastic</p>
        </div>
      </section>
    </main>

    <script>
      const presets = {
        compliment: [
          ["You look fantastic", "Classic and direct"],
          ["Your energy is magnetic", "Warm and bright"],
          ["That color loves you", "Playful style note"],
          ["You made this room better", "Big kindness"],
        ],
        celebrate: [
          ["You did it", "Short victory"],
          ["Legendary work", "High-impact praise"],
          ["That was a win", "Simple and loud"],
          ["The moment is yours", "Event-ready"],
        ],
        motivate: [
          ["Keep going", "Steady push"],
          ["You have this", "Calm confidence"],
          ["One bold step", "Focused nudge"],
          ["Make it happen", "Energetic command"],
        ],
        notice: [
          ["Back in 5", "Quick status"],
          ["Meeting starts now", "Clear alert"],
          ["Please take a seat", "Room message"],
          ["Quiet please", "Gentle notice"],
        ],
      };

      const themes = {
        sunset: ["#f9df6d", "#f56f46", "#1c7378", "#fff8e7", "#d84c33"],
        midnight: ["#15131c", "#315b91", "#f4c15d", "#fff6dc", "#315b91"],
        mint: ["#cbf2db", "#27887f", "#17353a", "#f7fff9", "#27887f"],
        rose: ["#ffe1e9", "#cf4265", "#35233a", "#fff4f7", "#cf4265"],
      };

      const messageInput = document.querySelector("#messageInput");
      const displayMessage = document.querySelector("#displayMessage");
      const presetList = document.querySelector("#presetList");
      const stageType = document.querySelector("#stageType");
      const sizeSlider = document.querySelector("#sizeSlider");
      const sizeValue = document.querySelector("#sizeValue");
      const presentButton = document.querySelector("#presentButton");
      let activeType = "compliment";
      let activeFont = "sans";

      function renderMessage() {
        displayMessage.textContent = messageInput.value.trim() || "say it big";
      }

      function renderPresets() {
        presetList.innerHTML = "";
        presets[activeType].forEach(([message, note]) => {
          const button = document.createElement("button");
          button.className = "preset";
          button.type = "button";
          button.innerHTML = `<strong>${message}</strong><span>${note}</span>`;
          button.addEventListener("click", () => {
            messageInput.value = message.toLowerCase();
            renderMessage();
          });
          presetList.appendChild(button);
        });
      }

      function setTheme(themeName) {
        const [a, b, c, ink, accent] = themes[themeName];
        document.documentElement.style.setProperty("--stage-a", a);
        document.documentElement.style.setProperty("--stage-b", b);
        document.documentElement.style.setProperty("--stage-c", c);
        document.documentElement.style.setProperty("--stage-ink", ink);
        document.documentElement.style.setProperty("--accent", accent);
        document.querySelectorAll(".swatch").forEach((swatch) => {
          swatch.classList.toggle("active", swatch.dataset.theme === themeName);
        });
      }

      function setType(type) {
        activeType = type;
        stageType.textContent = type;
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.type === type);
        });
        renderPresets();
      }

      function setFont(font) {
        activeFont = font;
        displayMessage.classList.remove("serif", "script", "mono");
        if (font !== "sans") {
          displayMessage.classList.add(font);
        }
        document.querySelectorAll("[data-font]").forEach((button) => {
          button.classList.toggle("active", button.dataset.font === activeFont);
        });
      }

      messageInput.addEventListener("input", renderMessage);

      sizeSlider.addEventListener("input", () => {
        const size = `${sizeSlider.value}vw`;
        sizeValue.value = size;
        document.documentElement.style.setProperty("--message-size", size);
      });

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => setType(tab.dataset.type));
      });

      document.querySelectorAll(".swatch").forEach((swatch) => {
        swatch.addEventListener("click", () => setTheme(swatch.dataset.theme));
      });

      document.querySelectorAll("[data-font]").forEach((button) => {
        button.addEventListener("click", () => setFont(button.dataset.font));
      });

      document.querySelectorAll("[data-effect]").forEach((button) => {
        button.addEventListener("click", () => {
          button.classList.toggle("active");
          displayMessage.classList.toggle(button.dataset.effect);
        });
      });

      presentButton.addEventListener("click", () => {
        document.body.classList.toggle("presentation");
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          document.body.classList.remove("presentation");
        }
      });

      setType(activeType);
      setTheme("sunset");
      setFont(activeFont);
      renderMessage();
    </script>
  </body>
</html>
