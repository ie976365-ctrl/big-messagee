    <script>
      const presets = {
        compliment: [
          ["You look fantastic", "Classic and direct"],
          ["Your energy is magnetic", "Warm and bright"],
          ["That color loves you", "Playful style note"],
          ["You made this room better", "Big kindness"],
        ],
        celebrate: [
          ["You did it", "Short victory"],
          ["Legendary work", "High-impact praise"],
          ["That was a win", "Simple and loud"],
          ["The moment is yours", "Event-ready"],
        ],
        motivate: [
          ["Keep going", "Steady push"],
          ["You have this", "Calm confidence"],
          ["One bold step", "Focused nudge"],
          ["Make it happen", "Energetic command"],
        ],
        notice: [
          ["Back in 5", "Quick status"],
          ["Meeting starts now", "Clear alert"],
          ["Please take a seat", "Room message"],
          ["Quiet please", "Gentle notice"],
        ],
      };

      const themes = {
        sunset: ["#f9df6d", "#f56f46", "#1c7378", "#fff8e7", "#d84c33"],
        midnight: ["#15131c", "#315b91", "#f4c15d", "#fff6dc", "#315b91"],
        mint: ["#cbf2db", "#27887f", "#17353a", "#f7fff9", "#27887f"],
        rose: ["#ffe1e9", "#cf4265", "#35233a", "#fff4f7", "#cf4265"],
      };

      const messageInput = document.querySelector("#messageInput");
      const displayMessage = document.querySelector("#displayMessage");
      const presetList = document.querySelector("#presetList");
      const stageType = document.querySelector("#stageType");
      const sizeSlider = document.querySelector("#sizeSlider");
      const sizeValue = document.querySelector("#sizeValue");
      const presentButton = document.querySelector("#presentButton");
      const fireworksCanvas = document.querySelector("#fireworksCanvas");
      const sparkleField = document.querySelector("#sparkleField");
      const stage = document.querySelector("#stage");
      const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
      let activeType = "compliment";
      let activeFont = "sans";
      let activeMotion = "float";

      function playMessagePop() {
        displayMessage.classList.remove("pop");
        void displayMessage.offsetWidth;
        displayMessage.classList.add("pop");
      }

      function renderMessage() {
        displayMessage.textContent = messageInput.value.trim() || "say it big";
        playMessagePop();
      }

      function renderPresets() {
        presetList.innerHTML = "";
        presets[activeType].forEach(([message, note]) => {
          const button = document.createElement("button");
          const messageText = document.createElement("strong");
          const noteText = document.createElement("span");

          button.className = "preset";
          button.type = "button";
          button.innerHTML = `<strong>${message}</strong><span>${note}</span>`;
          messageText.textContent = message;
          noteText.textContent = note;
          button.append(messageText, noteText);
          button.addEventListener("click", () => {
            messageInput.value = message.toLowerCase();
            renderMessage();
          });
          presetList.appendChild(button);
        });
      }

      function setTheme(themeName) {
        const [a, b, c, ink, accent] = themes[themeName];
        document.documentElement.style.setProperty("--stage-a", a);
        document.documentElement.style.setProperty("--stage-b", b);
        document.documentElement.style.setProperty("--stage-c", c);
        document.documentElement.style.setProperty("--stage-ink", ink);
        document.documentElement.style.setProperty("--accent", accent);
        document.querySelectorAll(".swatch").forEach((swatch) => {
          swatch.classList.toggle("active", swatch.dataset.theme === themeName);
        });
      }

      function setType(type) {
        activeType = type;
        stageType.textContent = type;
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.type === type);
        });
        renderPresets();
      }

      function setMotion(motion) {
        activeMotion = motion;
        displayMessage.classList.remove("wave", "glow");
        if (motion !== "float") {
          displayMessage.classList.add(motion);
        }
        document.querySelectorAll("[data-motion]").forEach((button) => {
          button.classList.toggle("active", button.dataset.motion === activeMotion);
        });
      }

      function buildSparkles() {
        const sparkleCount = 18;
        sparkleField.innerHTML = "";

        Array.from({ length: sparkleCount }).forEach((_, index) => {
          const sparkle = document.createElement("span");
          sparkle.className = "sparkle";
          sparkle.style.setProperty("--x", `${8 + ((index * 29) % 84)}%`);
          sparkle.style.setProperty("--y", `${8 + ((index * 47) % 78)}%`);
          sparkle.style.setProperty("--size", `${4 + (index % 5) * 2}px`);
          sparkle.style.setProperty(
            "--duration",
            `${2.6 + (index % 4) * 0.65}s`,
          );
          sparkle.style.setProperty("--delay", `${index * -0.28}s`);
          sparkleField.appendChild(sparkle);
        });
      }

      function setFont(font) {
        activeFont = font;
        displayMessage.classList.remove("serif", "script", "mono");
        if (font !== "sans") {
          displayMessage.classList.add(font);
        }
        document.querySelectorAll("[data-font]").forEach((button) => {
          button.classList.toggle("active", button.dataset.font === activeFont);
        });
      }

      class FireworksShow {
        constructor(canvas, parent) {
          this.canvas = canvas;
          this.parent = parent;
          this.context = canvas.getContext("2d");
          this.rockets = [];
          this.particles = [];
          this.lastLaunch = 0;
          this.animationFrame = null;
          this.resizeObserver = new ResizeObserver(() => this.resize());
          this.resizeObserver.observe(parent);
          this.resize();
        }

        resize() {
          const rect = this.parent.getBoundingClientRect();
          const scale = window.devicePixelRatio || 1;
          this.width = rect.width;
          this.height = rect.height;
          this.canvas.width = Math.max(1, Math.floor(rect.width * scale));
          this.canvas.height = Math.max(1, Math.floor(rect.height * scale));
          this.context.setTransform(scale, 0, 0, scale, 0, 0);
        }

        start() {
          if (motionQuery.matches || this.animationFrame) {
            return;
          }
          this.lastLaunch = performance.now();
          this.animationFrame = requestAnimationFrame((time) => this.tick(time));
        }

        stop() {
          if (this.animationFrame) {
            cancelAnimationFrame(this.animationFrame);
            this.animationFrame = null;
          }
          this.context.clearRect(0, 0, this.width, this.height);
        }

        launch() {
          const hue = Math.floor(Math.random() * 360);
          this.rockets.push({
            x: this.width * (0.18 + Math.random() * 0.64),
            y: this.height + 20,
            targetY: this.height * (0.16 + Math.random() * 0.38),
            vx: (Math.random() - 0.5) * 1.4,
            vy: -(6.4 + Math.random() * 2.4),
            hue,
          });
        }

        explode(rocket) {
          const count = 42;
          for (let index = 0; index < count; index += 1) {
            const angle = (Math.PI * 2 * index) / count;
            const speed = 1.3 + Math.random() * 4.2;
            this.particles.push({
              x: rocket.x,
              y: rocket.y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              alpha: 1,
              radius: 1.4 + Math.random() * 2.4,
              hue: rocket.hue + Math.random() * 42 - 21,
            });
          }
        }

        tick(time) {
          this.context.clearRect(0, 0, this.width, this.height);

          if (time - this.lastLaunch > 850) {
            this.launch();
            this.lastLaunch = time;
          }

          this.rockets = this.rockets.filter((rocket) => {
            rocket.x += rocket.vx;
            rocket.y += rocket.vy;
            rocket.vy += 0.045;

            this.context.beginPath();
            this.context.arc(rocket.x, rocket.y, 2.4, 0, Math.PI * 2);
            this.context.fillStyle = `hsl(${rocket.hue} 100% 72%)`;
            this.context.fill();

            const shouldExplode = rocket.y <= rocket.targetY || rocket.vy >= -1;
            if (shouldExplode) {
              this.explode(rocket);
            }
            return !shouldExplode;
          });

          this.particles = this.particles.filter((particle) => {
            particle.x += particle.vx;
            particle.y += particle.vy;
            particle.vy += 0.035;
            particle.vx *= 0.988;
            particle.vy *= 0.988;
            particle.alpha -= 0.014;

            this.context.beginPath();
            this.context.arc(
              particle.x,
              particle.y,
              particle.radius,
              0,
              Math.PI * 2,
            );
            this.context.fillStyle = `hsla(${particle.hue} 100% 68% / ${
              particle.alpha
            })`;
            this.context.fill();
            return particle.alpha > 0;
          });

          this.animationFrame = requestAnimationFrame((nextTime) =>
            this.tick(nextTime),
          );
        }
      }

      const fireworks = new FireworksShow(fireworksCanvas, stage);

      displayMessage.addEventListener("animationend", (event) => {
        if (event.animationName === "textPop") {
          displayMessage.classList.remove("pop");
        }
      });

      messageInput.addEventListener("input", renderMessage);

      sizeSlider.addEventListener("input", () => {
        const size = `${sizeSlider.value}vw`;
        sizeValue.value = size;
        document.documentElement.style.setProperty("--message-size", size);
      });

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => setType(tab.dataset.type));
      });

      document.querySelectorAll(".swatch").forEach((swatch) => {
        swatch.addEventListener("click", () => setTheme(swatch.dataset.theme));
      });

      document.querySelectorAll("[data-font]").forEach((button) => {
        button.addEventListener("click", () => setFont(button.dataset.font));
      });

      document.querySelectorAll("[data-motion]").forEach((button) => {
        button.addEventListener("click", () => setMotion(button.dataset.motion));
      });

      document.querySelectorAll("[data-effect]").forEach((button) => {
        button.addEventListener("click", () => {
          button.classList.toggle("active");
          displayMessage.classList.toggle(button.dataset.effect);
        });
      });

      presentButton.addEventListener("click", () => {
        document.body.classList.toggle("presentation");
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          document.body.classList.remove("presentation");
        }
      });

      motionQuery.addEventListener("change", () => {
        if (motionQuery.matches) {
          fireworks.stop();
        } else {
          fireworks.start();
        }
      });

      buildSparkles();
      fireworks.start();
      setMotion(activeMotion);
      setType(activeType);
      setTheme("sunset");
      setFont(activeFont);
      renderMessage();
    </script>
